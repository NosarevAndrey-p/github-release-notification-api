[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name             tail
    Path             /var/log/app/*.log
    Parser           json
    Tag              app.logs
    Refresh_Interval 5
    Skip_Long_Lines  On

[OUTPUT]
    Name             es
    Match            *
    Host             elasticsearch
    Port             9200
    Index            app-logs
    Type             _doc
    Suppress_Type_Name On
    Replace_Dots     On
    Retry_Limit      False
