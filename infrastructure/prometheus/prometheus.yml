global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'subscription-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['subscription-service:3000']

  - job_name: 'notification-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['notification-service:3002']
